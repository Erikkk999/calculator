<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.jpeg">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="main-container off-state">
        <div class="name-container">
            <h1 class="name">
                <span class="green">Calcolat</span><span class="white">rice
                    Quat</span><span class="red">tromila&#8482;</span>
            </h1>
        </div>
        <div class="display-container">
            <div class="upper-display">
                <p class="upper-text"></p>
            </div>
            <div class="lower-display">
                <p class="lower-text"></p>
            </div>
        </div>
        <div class="button-container">
            <button class="power" value="power">ON</button>
            <button class="clear" value="clear-all">AC</button>
            <button class="backspace" value="backspace">C</button>
            <button class="divide operator" value="/">&#247;</button>
            <button class="num 7" value="7">7</button>
            <button class="num 8" value="8">8</button>
            <button class="num 9" value="9">9</button>
            <button class="multiply operator" value="*">&#215;</button>
            <button class="num 4" value="4">4</button>
            <button class="num 5" value="5">5</button>
            <button class="num 6" value="6">6</button>
            <button class="subtract operator" value="-">&#8722;</button>
            <button class="num 1" value="1">1</button>
            <button class="num 2" value="2">2</button>
            <button class="num 3" value="3">3</button>
            <button class="add operator" value="+">&#43;</button>
            <button class="decimal" value=".">,</button>
            <button class="num 0" value="0">0</button>
            <button class="equals" value="=">&equals;</button>
        </div>
    </div>
</body>
</html>
