<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="main-container off-state">
        <div class="name-container">
            <h1 class="name">
                <span class="green">Calcolat</span><span class="white">rice
                    Quat</span><span class="red">tromila&#8482;</span>
            </h1>
        </div>
        <div class="display-container">
            <div class="upper-display">
                <p class="upper-text"></p>
            </div>
            <div class="lower-display">
                <p class="lower-text"></p>
            </div>
        </div>
        <div class="button-container">
            <button class="power button">ON</button>
            <button class="clear button">AC</button>
            <button class="backspace button">C</button>
            <button class="divide button">&#247;</button>
            <button class="num 7 button">7</button>
            <button class="num 8 button">8</button>
            <button class="num 9 button">9</button>
            <button class="multiply button">&#215;</button>
            <button class="num 4 button">4</button>
            <button class="num 5 button">5</button>
            <button class="num 6 button">6</button>
            <button class="subtract button">&#8722;</button>
            <button class="num 1 button">1</button>
            <button class="num 2 button">2</button>
            <button class="num 3 button">3</button>
            <button class="add button">&#43;</button>
            <button class="decimal button">,</button>
            <button class="num 0 button">0</button>
            <button class="equals button">&equals;</button>
        </div>
    </div>
</body>
</html>
